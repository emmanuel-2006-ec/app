<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mzuzu Hub – Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family: "Inter", sans-serif;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(145deg, #0f2a1a 0%, #1a472a 45%, #2d7d3a 100%);
      padding: 20px;
    }
    .auth-card {
      background: rgba(255,255,255,0.96);
      backdrop-filter: blur(12px);
      border-radius: 40px;
      padding: 48px 40px 40px;
      max-width: 440px;
      width: 100%;
      box-shadow: 0 30px 60px rgba(0,0,0,0.30);
    }
    .logo { text-align:center; margin-bottom:28px; }
    .logo .icon {
      display: inline-flex; align-items:center; justify-content:center;
      width:80px; height:80px;
      background: linear-gradient(145deg, #1a472a, #2d7d3a);
      border-radius:28px; color:#f5c842; font-size:38px;
      margin-bottom:10px;
      box-shadow: 0 12px 28px rgba(26,71,42,0.35);
    }
    .logo h1 { font-size:26px; font-weight:700; color:#1a472a; }
    .logo h1 span { color:#f5c842; }
    .logo p { color:#5a6a7a; font-size:14px; font-weight:500; }
    .form-group { margin-bottom:18px; }
    .form-group label { display:block; font-size:13px; font-weight:600; color:#2d3a4a; margin-bottom:5px; }
    .form-group input {
      width:100%; padding:14px 18px;
      border:2px solid #e8ecf1; border-radius:16px;
      font-size:15px; background:#f8fafc;
      outline:none; transition:0.25s;
    }
    .form-group input:focus { border-color:#1a472a; background:#fff; box-shadow:0 0 0 4px rgba(26,71,42,0.12); }
    .btn-primary {
      width:100%; padding:15px;
      background:linear-gradient(145deg, #1a472a, #2d7d3a);
      border:none; border-radius:16px; color:#fff;
      font-size:17px; font-weight:700; cursor:pointer;
      box-shadow:0 8px 24px rgba(26,71,42,0.30);
      transition:0.25s;
    }
    .btn-primary:hover { transform:translateY(-2px); box-shadow:0 12px 32px rgba(26,71,42,0.40); }
    .switch-link { text-align:center; margin-top:20px; font-size:14px; color:#5a6a7a; }
    .switch-link a { color:#1a472a; font-weight:700; cursor:pointer; text-decoration:none; }
    .switch-link a:hover { color:#f5c842; }
    .error-msg {
      background:#fee8e8; color:#c0392b;
      padding:10px 14px; border-radius:12px;
      font-size:13px; font-weight:500;
      margin-bottom:16px; display:none;
      border-left:4px solid #c0392b;
    }
    .error-msg.show { display:block; }
  </style>
</head>
<body>
<div class="auth-card">
  <div class="logo">
    <div class="icon"><i class="fas fa-graduation-cap"></i></div>
    <h1>Mzuzu <span>Hub</span></h1>
    <p>Mzuzu University Social Platform</p>
  </div>
  <div id="loginError" class="error-msg"><i class="fas fa-exclamation-circle"></i> Invalid credentials</div>
  <div class="form-group">
    <label><i class="fas fa-envelope"></i> Email</label>
    <input type="email" id="loginEmail" placeholder="student@mzuni.ac.mw" />
  </div>
  <div class="form-group">
    <label><i class="fas fa-lock"></i> Password</label>
    <input type="password" id="loginPassword" placeholder="••••••••" />
  </div>
  <button class="btn-primary" id="loginBtn"><i class="fas fa-sign-in-alt"></i> Log In</button>
  <div class="switch-link">
    Don't have an account? <a href="/signup.html">Create one</a>
  </div>
</div>
<script>
  const API_BASE = '';
  async function apiCall(endpoint, options = {}) {
    const headers = { 'Content-Type': 'application/json' };
    const res = await fetch(`${API_BASE}${endpoint}`, { ...options, headers });
    if (!res.ok) {
      let errMsg = 'Request failed';
      try { const errData = await res.json(); errMsg = errData.error || errMsg; } catch(_) {}
      throw new Error(errMsg);
    }
    const text = await res.text();
    return text ? JSON.parse(text) : null;
  }

  document.getElementById('loginBtn').addEventListener('click', async () => {
    const email = document.getElementById('loginEmail').value.trim();
    const password = document.getElementById('loginPassword').value.trim();
    const errEl = document.getElementById('loginError');
    errEl.classList.remove('show');
    if (!email || !password) { errEl.textContent = 'Please fill in all fields.'; errEl.classList.add('show'); return; }
    try {
      const data = await apiCall('/api/login', { method: 'POST', body: JSON.stringify({ email, password }) });
      sessionStorage.setItem('token', data.token);
      sessionStorage.setItem('user', JSON.stringify(data.user));
      window.location.href = '/dashboard.html';
    } catch (e) {
      errEl.textContent = e.message || 'Invalid credentials';
      errEl.classList.add('show');
    }
  });

  document.getElementById('loginPassword').addEventListener('keydown', e => { if (e.key === 'Enter') document.getElementById('loginBtn').click(); });
  document.getElementById('loginEmail').addEventListener('keydown', e => { if (e.key === 'Enter') document.getElementById('loginBtn').click(); });

  // If already logged in, redirect to dashboard
  if (sessionStorage.getItem('token')) window.location.href = '/dashboard.html';
</script>
</body>
</html>
