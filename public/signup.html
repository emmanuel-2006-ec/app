<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mzuzu Hub – Sign Up</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family: "Inter", sans-serif;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(145deg, #0f2a1a 0%, #1a472a 45%, #2d7d3a 100%);
      padding: 20px;
    }
    .auth-card {
      background: rgba(255,255,255,0.96);
      backdrop-filter: blur(12px);
      border-radius: 40px;
      padding: 40px 36px 36px;
      max-width: 480px;
      width: 100%;
      box-shadow: 0 30px 60px rgba(0,0,0,0.30);
      max-height: 96vh;
      overflow-y: auto;
    }
    .logo { text-align:center; margin-bottom:28px; }
    .logo .icon {
      display: inline-flex; align-items:center; justify-content:center;
      width:64px; height:64px;
      background: linear-gradient(145deg, #1a472a, #2d7d3a);
      border-radius:22px; color:#f5c842; font-size:30px;
      margin-bottom:10px;
      box-shadow: 0 12px 28px rgba(26,71,42,0.35);
    }
    .logo h1 { font-size:22px; font-weight:700; color:#1a472a; }
    .logo h1 span { color:#f5c842; }
    .logo p { color:#5a6a7a; font-size:14px; font-weight:500; }
    .form-group { margin-bottom:14px; }
    .form-group label { display:block; font-size:12px; font-weight:600; color:#2d3a4a; margin-bottom:4px; }
    .form-group input, .form-group select {
      width:100%; padding:12px 16px;
      border:2px solid #e8ecf1; border-radius:14px;
      font-size:14px; background:#f8fafc;
      outline:none; transition:0.25s;
    }
    .form-group input:focus, .form-group select:focus { border-color:#1a472a; background:#fff; box-shadow:0 0 0 4px rgba(26,71,42,0.10); }
    .profile-pic-upload {
      display:flex; align-items:center; gap:16px; margin-top:4px;
    }
    .profile-pic-upload .avatar-preview {
      width:64px; height:64px; border-radius:50%;
      background:#e8ecf1; display:flex; align-items:center; justify-content:center;
      font-size:28px; color:#5a6a7a; border:3px solid #1a472a; overflow:hidden;
      flex-shrink:0;
    }
    .profile-pic-upload .avatar-preview img { width:100%; height:100%; object-fit:cover; }
    .profile-pic-upload .upload-btn {
      padding:10px 18px; background:#eef2f7; border:2px dashed #b0c0d0;
      border-radius:12px; font-size:13px; font-weight:600; color:#2d3a4a;
      cursor:pointer; text-align:center; flex:1;
    }
    .profile-pic-upload .upload-btn:hover { background:#e4eaf0; border-color:#1a472a; }
    .profile-pic-upload input[type="file"] { display:none; }
    .btn-primary {
      width:100%; padding:15px;
      background:linear-gradient(145deg, #1a472a, #2d7d3a);
      border:none; border-radius:16px; color:#fff;
      font-size:17px; font-weight:700; cursor:pointer;
      box-shadow:0 8px 24px rgba(26,71,42,0.30);
      transition:0.25s;
      margin-top:8px;
    }
    .btn-primary:hover { transform:translateY(-2px); box-shadow:0 12px 32px rgba(26,71,42,0.40); }
    .switch-link { text-align:center; margin-top:20px; font-size:14px; color:#5a6a7a; }
    .switch-link a { color:#1a472a; font-weight:700; cursor:pointer; text-decoration:none; }
    .switch-link a:hover { color:#f5c842; }
    .error-msg {
      background:#fee8e8; color:#c0392b;
      padding:10px 14px; border-radius:12px;
      font-size:13px; font-weight:500;
      margin-bottom:16px; display:none;
      border-left:4px solid #c0392b;
    }
    .error-msg.show { display:block; }
  </style>
</head>
<body>
<div class="auth-card">
  <div class="logo">
    <div class="icon"><i class="fas fa-user-plus"></i></div>
    <h1>Join <span>Mzuzu Hub</span></h1>
    <p>Create your account</p>
  </div>
  <div id="signupError" class="error-msg"><i class="fas fa-exclamation-circle"></i> <span id="signupErrorText">Please fix the errors</span></div>
  <div class="form-group">
    <label><i class="fas fa-user"></i> Username</label>
    <input type="text" id="signupUsername" placeholder="e.g. john_doe" />
  </div>
  <div class="form-group">
    <label><i class="fas fa-envelope"></i> Email</label>
    <input type="email" id="signupEmail" placeholder="student@mzuni.ac.mw" />
  </div>
  <div class="form-group">
    <label><i class="fas fa-lock"></i> Password</label>
    <input type="password" id="signupPassword" placeholder="Min 6 characters" />
  </div>
  <div class="form-group">
    <label><i class="fas fa-calendar-alt"></i> Year of Study</label>
    <select id="signupYear">
      <option value="">Select your year</option>
      <option value="First Year">First Year</option>
      <option value="Second Year">Second Year</option>
      <option value="Third Year">Third Year</option>
      <option value="Fourth Year">Fourth Year</option>
      <option value="Fifth Year">Fifth Year</option>
    </select>
  </div>
  <div class="form-group">
    <label><i class="fas fa-image"></i> Profile Picture</label>
    <div class="profile-pic-upload">
      <div class="avatar-preview" id="avatarPreview"><i class="fas fa-user"></i></div>
      <label class="upload-btn" for="profilePicInput">
        <i class="fas fa-upload"></i> Upload Photo
      </label>
      <input type="file" id="profilePicInput" accept="image/*" />
    </div>
  </div>
  <button class="btn-primary" id="signupBtn"><i class="fas fa-user-plus"></i> Create Account</button>
  <div class="switch-link">
    Already have an account? <a href="/login.html">Log in</a>
  </div>
</div>
<script>
  const API_BASE = '';
  async function apiCall(endpoint, options = {}) {
    const headers = { 'Content-Type': 'application/json' };
    const res = await fetch(`${API_BASE}${endpoint}`, { ...options, headers });
    if (!res.ok) {
      let errMsg = 'Request failed';
      try { const errData = await res.json(); errMsg = errData.error || errMsg; } catch(_) {}
      throw new Error(errMsg);
    }
    const text = await res.text();
    return text ? JSON.parse(text) : null;
  }

  function getDefaultAvatar() {
    return 'data:image/svg+xml,%3Csvg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"%3E%3Ccircle cx="50" cy="50" r="50" fill="%231a472a"/%3E%3Ctext x="50" y="62" font-size="40" text-anchor="middle" fill="%23f5c842" font-family="Arial"%3E🎓%3C/text%3E%3C/svg%3E';
  }

  document.getElementById('signupBtn').addEventListener('click', async () => {
    const username = document.getElementById('signupUsername').value.trim();
    const email = document.getElementById('signupEmail').value.trim();
    const password = document.getElementById('signupPassword').value.trim();
    const year = document.getElementById('signupYear').value;
    const errEl = document.getElementById('signupError');
    const errText = document.getElementById('signupErrorText');
    errEl.classList.remove('show');
    if (!username || !email || !password || !year) {
      errText.textContent = 'All fields are mandatory.';
      errEl.classList.add('show');
      return;
    }
    if (password.length < 6) {
      errText.textContent = 'Password must be at least 6 characters.';
      errEl.classList.add('show');
      return;
    }
    const fileInput = document.getElementById('profilePicInput');
    let avatar = getDefaultAvatar();
    if (fileInput.files && fileInput.files[0]) {
      const reader = new FileReader();
      avatar = await new Promise((resolve) => {
        reader.onload = e => resolve(e.target.result);
        reader.readAsDataURL(fileInput.files[0]);
      });
    }
    try {
      const data = await apiCall('/api/register', {
        method: 'POST',
        body: JSON.stringify({ username, email, password, yearOfStudy: year, profilePic: avatar })
      });
      // On success, store token and user, then go to dashboard
      sessionStorage.setItem('token', data.token);
      sessionStorage.setItem('user', JSON.stringify(data.user));
      window.location.href = '/dashboard.html';
    } catch (e) {
      errText.textContent = e.message || 'Registration failed';
      errEl.classList.add('show');
    }
  });

  // Preview avatar
  document.getElementById('profilePicInput').addEventListener('change', function() {
    if (this.files && this.files[0]) {
      const reader = new FileReader();
      reader.onload = function(e) {
        document.getElementById('avatarPreview').innerHTML = `<img src="${e.target.result}" alt="avatar" />`;
      };
      reader.readAsDataURL(this.files[0]);
    }
  });

  if (sessionStorage.getItem('token')) window.location.href = '/dashboard.html';
</script>
</body>
</html>
